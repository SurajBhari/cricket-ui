<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket Score Bar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#11150c; --paper:#FFF7DB; --green:#1FAE54; --red:#E63946; --yellow:#FFC700; }
  *{box-sizing:border-box;margin:0;padding:0}
  /* transparent so it works as an OBS browser source */
  body{font-family:'DM Sans',sans-serif;background:transparent;min-height:100vh;display:flex;align-items:flex-end;padding:24px}
  .bar{display:flex;align-items:stretch;gap:0;border:3px solid var(--ink);box-shadow:6px 6px 0 var(--ink);
    background:var(--paper);color:var(--ink);overflow:hidden;font-weight:700}
  .seg{display:flex;flex-direction:column;justify-content:center;padding:10px 18px;border-right:3px solid var(--ink)}
  .seg:last-child{border-right:none}
  .seg .lbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;opacity:.6;font-weight:700}
  .team{background:var(--green);color:#fff}
  .team .big{font-family:'Syne';font-weight:800;font-size:26px;line-height:1}
  .team .ovs{font-size:12px;opacity:.9}
  .bat .row{display:flex;justify-content:space-between;gap:18px;font-size:14px}
  .bat .row .on{font-weight:800}
  .bowl{background:var(--yellow)}
  .bowl .big{font-family:'Syne';font-weight:800;font-size:20px}
  .status{background:var(--ink);color:#fff;display:flex;align-items:center;font-family:'Syne';font-weight:700;font-size:14px;min-width:0}
  .status .live{width:9px;height:9px;border-radius:50%;background:var(--red);margin-right:8px;animation:blink 1.1s infinite}
  @keyframes blink{50%{opacity:.25}}
  /* unavailable state */
  #unavailable{display:none;align-items:center;gap:10px;background:var(--paper);border:3px solid var(--ink);box-shadow:6px 6px 0 var(--ink);
    padding:14px 20px;font-family:'Syne';font-weight:700;font-size:15px;color:var(--ink)}
  #unavailable a{color:var(--red)}
  #bar{display:none}
</style>
</head>
<body>
  <div class="bar" id="bar">
    <div class="seg team">
      <span class="lbl"><span id="otteam"></span><span id="bat"></span></span>
      <span class="big" id="score">—</span>
      <span class="ovs">Ov <span id="over">—</span></span>
    </div>
    <div class="seg bat">
      <div class="row on"><span id="b1name">—</span><span id="b1stats"></span></div>
      <div class="row"><span id="b2name">—</span><span id="b2stats"></span></div>
    </div>
    <div class="seg bowl">
      <span class="lbl">Bowler</span>
      <span class="big"><span id="bname">—</span> <span id="bstats"></span></span>
      <span class="ovs">last ov: <span id="recentover">—</span></span>
    </div>
    <div class="seg status">
      <span class="live"></span>
      <span><span id="target"></span> <span id="needs"></span></span>
    </div>
  </div>

  <div id="unavailable">
    🏏 Live score data is currently unavailable.
    <a href="{{ cricbuzz_url }}" target="_blank">Open on cricbuzz →</a>
  </div>

<script>
  const api = "{{ api_link }}";
  function setText(id, v){ const el=document.getElementById(id); if(el) el.innerHTML = v; }
  function update(){
    fetch(api).then(r=>r.json()).then(data=>{
      if(!data || data.available === false){
        document.getElementById('bar').style.display='none';
        document.getElementById('unavailable').style.display='flex';
        return;
      }
      document.getElementById('unavailable').style.display='none';
      document.getElementById('bar').style.display='flex';
      setText('b1name', '▸ ' + (data.batsman_1||''));
      setText('b2name', data.batsman_2||'');
      setText('b1stats', (data.b1_runs||0) + ' (' + (data.b1_balls||0) + ')');
      setText('b2stats', (data.b2_runs||0) + ' (' + (data.b2_balls||0) + ')');
      setText('otteam', (data.other_team||'') + ' v ');
      setText('bat', data.team_playing||'');
      setText('score', (data.runs||0) + '/' + (data.wickets||0));
      setText('over', data.over||'');
      setText('recentover', data.over_recent||'');
      setText('bname', data.bowler||'');
      setText('bstats', (data.bowler_wickets||0) + '-' + (data.bowler_runs||0));
      setText('target', data.target ? ('Target ' + data.target) : '');
      setText('needs', data.target ? (data.need_string||'') : '');
    }).catch(()=>{
      document.getElementById('bar').style.display='none';
      document.getElementById('unavailable').style.display='flex';
    });
  }
  update();
  setInterval(update, 10000);
</script>
</body>
</html>
